services:
  - type: web
    name: intelliasset-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*" # To avoid CORS initially, the user can lock it down in the Render dashboard later
      - key: DEMO_MODE
        value: "false"
      - key: GEMINI_API_KEY
        sync: false
